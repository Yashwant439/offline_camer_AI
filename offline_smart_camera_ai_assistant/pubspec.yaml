name: offline_smart_camera_ai_assistant
description: Offline Smart Camera AI Assistant using RunAnywhere on-device AI runtime.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  permission_handler: ^11.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3
  crypto: ^3.0.3
  uuid: ^4.4.2
  runanywhere: ^0.16.0
  runanywhere_llamacpp: ^0.16.0
  runanywhere_onnx: ^0.16.0
  record: ^6.2.0
  flutter_tts: ^4.2.5
  collection: ^1.18.0
  image: ^4.2.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/db/objects_seed.json
    - assets/models/
